# Secrets (set via `wrangler secret put <NAME>`):
# Required:
# - STRIPE_SECRET_KEY          (Stripe secret key - used if _TEST/_LIVE not set)
# - MAGIC_LINK_SECRET          (HMAC secret for token signing)
# - RESEND_API_KEY             (Resend email API key)
# - ADMIN_SECRET               (Admin API key for recovery/rebuild endpoints and scoped-secret fallback)
# - TURNSTILE_SECRET_KEY       (shared Cloudflare Turnstile secret for admin sign-in)
#
# Optional (for separate test/live keys):
# - STRIPE_SECRET_KEY_LIVE / STRIPE_SECRET_KEY_TEST
# - STRIPE_WEBHOOK_SECRET_LIVE / STRIPE_WEBHOOK_SECRET_TEST
# - STRIPE_WEBHOOK_SECRET      (webhook signing secret)
# - FILM_STRIPE_SUMMARY_ADAPTER_SECRET (shared bearer secret for Film summary-only aggregate reads)
# - USPS_CLIENT_SECRET         (USPS OAuth client secret for live shipping quotes)
# - ADMIN_TURNSTILE_SECRET_KEY (admin-specific Turnstile secret if not using TURNSTILE_SECRET_KEY)
# - STORE_DOWNLOAD_SECRET      (optional dedicated HMAC secret for signed download/fulfillment links)
# - WORKERS_CACHE_PURGE_SECRET (dedicated bearer secret for deploy-time Workers Cache purge)
# - WORKERS_CACHE_EVIDENCE_SECRET (dedicated bearer secret for the read-only scheduled cache probe)
#
# Optional (for GitHub rebuild trigger):
# - GITHUB_TOKEN               (GitHub PAT with workflow scope)
# - GITHUB_OWNER               (set explicitly; legacy helper fallback is not launch-safe)
# - GITHUB_REPO                (set explicitly; legacy helper fallback is not launch-safe)
# - GITHUB_WORKFLOW            (defaults to 'deploy.yml')
# - ADMIN_TURNSTILE_REQUIRED   (set true to fail closed when Turnstile is expected)
# - ADMIN_TURNSTILE_BYPASS     (local/test-only bypass for automated admin auth tests)

