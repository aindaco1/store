name = "store-worker"
main = "src/index.js"
compatibility_date = "2026-07-09"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

routes = [
  { pattern = "checkout.dustwave.xyz/*", zone_name = "dustwave.xyz" }
]

[cache]
enabled = false

[exports.CachedAdminStoreReads]
type = "worker"

  [exports.CachedAdminStoreReads.cache]
  enabled = true

[exports.CachedAdminStoreOrderIndex]
type = "worker"

  [exports.CachedAdminStoreOrderIndex.cache]
  enabled = true

[[analytics_engine_datasets]]
binding = "STORE_CACHE_METRICS"
dataset = "store_workers_cache_metrics"

# Cron trigger:
# - `* * * * *`: timezone-aware platform scheduler. Individual tasks gate on
#   the configured platform timezone and idempotency markers.
[triggers]
crons = ["* * * * *"]

