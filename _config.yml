      role: super_admin
admin_production_site_url: https://shop.dustwave.xyz
admin_production_worker_url: https://checkout.dustwave.xyz
pricing:
  sales_tax_rate: 0.07625
  flat_shipping_rate: 3.0
  default_tip_percent: 5
  max_tip_percent: 15
tax:
  provider: nm_grt
  origin_country: US
  use_regional_origin: true
  nm_grt_api_base: https://grt.edacnm.org
  zip_tax_api_base: https://api.zip-tax.com
shipping:
  origin_zip: "87120"
  origin_country: US
  fallback_flat_rate: 3.0
  free_shipping_default: false
  default_option: standard
  usps:
    enabled: true
    client_id: oRhAt2qaXL4xbqmM4PTlHeXmimAZGK7mfz068oqVwnVlrrlR
    api_base: ""
    timeout_ms: 5000
    quote_cache_ttl_seconds: 600
    failure_cooldown_seconds: 300
    rate_limit_cooldown_seconds: 1800
  presets:
    tshirt:
      weight_oz: 6.5
      packaging_weight_oz: 1
      length_in: 12
      width_in: 10
      height_in: 1.5
      stack_height_in: 0.5
    sticker:
      weight_oz: 1
      packaging_weight_oz: 0.5
      length_in: 11.5
      width_in: 6.125
      height_in: 0.2
      stack_height_in: 0.05
      manual_domestic_rate: FIRST_CLASS_FLAT
      usps_domestic:
        processing_category: NON_MACHINABLE
        rate_indicator: SP
        mail_classes:
          - USPS_GROUND_ADVANTAGE
          - PRIORITY_MAIL
    poster:
      weight_oz: 5
      packaging_weight_oz: 3
      length_in: 18
      width_in: 3
      height_in: 3
      stack_height_in: 0.5
    parcel:
      weight_oz: 12
      packaging_weight_oz: 4
      length_in: 12
      width_in: 9
      height_in: 4
      stack_height_in: 1
    mug:
      weight_oz: 16
      packaging_weight_oz: 6
      length_in: 6
      width_in: 6
      height_in: 6
      stack_height_in: 6
    ticket:
      weight_oz: 0
      packaging_weight_oz: 0
      length_in: 0
      width_in: 0
      height_in: 0
      stack_height_in: 0
