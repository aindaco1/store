title: Shop
author: Dust Wave
description: Dust Wave merch, prints, tickets, downloads, and event RSVPs.
url: https://shop.dustwave.xyz
markdown: kramdown
permalink: pretty
seo:
  x_handle: ""
  same_as: []
  default_social_image_alt: Dust Wave Shop
  merchant_return_policy:
    applicable_country: US
    return_policy_category: https://schema.org/MerchantReturnFiniteReturnWindow
    merchant_return_days: 14
    return_fees: https://schema.org/ReturnFeesCustomerResponsibility
    return_method: https://schema.org/ReturnByMail
  og_locale_overrides:
    en: en_US
debug:
  console_logging_enabled: true
  verbose_console_logging: false
exclude:
  - README.md
  - LICENSE
  - worker
  - scripts
  - tests
  - test-results
  - playwright-report
  - package.json
  - package-lock.json
  - playwright.config.js
  - vitest.config.ts
  - vitest.config.mts
  - vitest.security.config.ts
  - vitest.security.config.mts
  - assets/**/*.optimized
  - assets/**/*.optimized.*
  - out-of-stock
  - Containerfile.dev
  - Containerfile.playwright.dev
platform:
  name: Shop
  version: 1.0.6
  release_label: v1.0.6
  company_name: Dust Wave
  support_email: info@dustwave.xyz
  orders_email_from: Shop <orders@shop.dustwave.xyz>
  updates_email_from: Shop <updates@shop.dustwave.xyz>
  site_url: https://shop.dustwave.xyz
  worker_url: https://checkout.dustwave.xyz
  default_creator_name: Dust Wave
  timezone: America/Denver
  logo_path: "/assets/images/defaults/dust-wave-square.png"
