  color_text_strong: "#101215"
  color_text_muted: "#5d6573"
  color_text_soft: "#7b8494"
  color_page_background: "#f7f7f4"
  color_surface_base: "#ffffff"
  color_surface_subtle: "#f0f1ed"
  color_surface_soft: "#e8ebe5"
  color_surface_strong: "#d9ddd5"
  color_border: "#d2d7df"
