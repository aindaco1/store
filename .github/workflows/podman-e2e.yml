name: Podman E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

concurrency:
  group: podman-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  podman-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SITE_BASE: http://127.0.0.1:4002
      WORKER_BASE: http://127.0.0.1:8989
      WORKER_URL: http://127.0.0.1:8989
      APP_MODE: test
      STRIPE_SECRET_KEY: sk_test_smoke
      STRIPE_WEBHOOK_SECRET: whsec_smoke
      ADMIN_SECRET: test-admin-secret
      ADMIN_BOOTSTRAP_EMAILS: admin@example.com
      MAGIC_LINK_SECRET: test-magic-link-secret
      RESEND_API_KEY: re_test_smoke
      SKIP_STRIPE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run Podman doctor
        run: npm run podman:doctor

      - name: Run Podman headless E2E
        run: npm run test:e2e:headless:podman

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: podman-playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
