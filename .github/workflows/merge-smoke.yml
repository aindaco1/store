name: Merge Smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: merge-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SITE_BASE: http://127.0.0.1:4000
      WORKER_BASE: http://127.0.0.1:8787
      WORKER_URL: http://127.0.0.1:8787
      SNIPCART_MODE: test
      STRIPE_SECRET_KEY: sk_test_smoke
      STRIPE_WEBHOOK_SECRET: whsec_smoke
      ADMIN_SECRET: test-admin-secret
      MAGIC_LINK_SECRET: test-magic-link-secret
      RESEND_API_KEY: re_test_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci --prefix worker

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run merge smoke gate
        run: npm run test:premerge

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
