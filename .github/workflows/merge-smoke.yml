name: Merge Smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SITE_BASE: http://127.0.0.1:4002
      WORKER_BASE: http://127.0.0.1:8989
      WORKER_URL: http://127.0.0.1:8989
      APP_MODE: test
      STRIPE_SECRET_KEY: sk_test_smoke
      STRIPE_WEBHOOK_SECRET: whsec_smoke
      ADMIN_SECRET: test-admin-secret
      ADMIN_BOOTSTRAP_EMAILS: admin@example.com
      MAGIC_LINK_SECRET: test-magic-link-secret
      RESEND_API_KEY: re_test_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci --prefix worker

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run merge smoke gate
        run: npm run test:premerge

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
