name: Production Posture

on:
  workflow_dispatch:
  schedule:
    - cron: '11 4 * * 1'
      timezone: 'America/Denver'

permissions:
  contents: read
  issues: write

concurrency:
  group: production-posture
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
      CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List production Worker secret names
        run: |
          if ! (cd worker && npx wrangler secret list --format json) > worker-secrets.json; then
            printf '[]\n' > worker-secrets.json
          fi

      - name: Collect provider posture
        continue-on-error: true
        run: npm run release:providers -- --strict --no-dev-vars --json-output=provider-evidence.json

      - name: Audit production posture
        id: posture
        continue-on-error: true
        run: >-
          npm run production:posture --
          --secrets-file=worker-secrets.json
          --provider-evidence=provider-evidence.json
          --output=production-posture.json
          --issue-output=production-posture-issue.md

      - name: Open or update posture issue
        if: steps.posture.outcome == 'failure'
        run: |
          title='Production configuration posture drift'
          issue_number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --body-file production-posture-issue.md
          else
            gh issue create --title "$title" --body-file production-posture-issue.md
          fi

      - name: Upload sanitized posture evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-posture-${{ github.run_id }}
          path: |
            production-posture.json
            production-posture-issue.md
            provider-evidence.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Enforce posture gate
        if: steps.posture.outcome == 'failure'
        run: exit 1
