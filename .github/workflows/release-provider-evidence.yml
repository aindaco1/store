name: Release Provider Evidence

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-provider-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloudflare-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      SITE_BASE: https://shop.dustwave.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify Cloudflare DNS release evidence
        run: npm run release:providers -- --cloudflare-dns-only --strict --no-dev-vars

      - name: Verify admin response security rule
        run: npm run cloudflare:admin-response-rule -- --verify-public --require-current
