name: Workers Cache Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
      timezone: 'America/Denver'

permissions:
  contents: read

concurrency:
  group: production-operations
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production-observability
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ANALYTICS_API_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      WORKERS_CACHE_EVIDENCE_SECRET: ${{ secrets.WORKERS_CACHE_EVIDENCE_SECRET }}
      WORKER_BASE: ${{ vars.WORKER_BASE || 'https://checkout.dustwave.xyz' }}
      WORKERS_CACHE_ANALYTICS_DATASET: ${{ vars.WORKERS_CACHE_ANALYTICS_DATASET || 'store_workers_cache_metrics' }}
      WORKERS_CACHE_MAX_RECENT_REQUESTS: ${{ vars.WORKERS_CACHE_MAX_RECENT_REQUESTS || '25' }}
      WORKERS_CACHE_MINIMUM_REQUESTS: ${{ vars.WORKERS_CACHE_MINIMUM_REQUESTS || '10' }}
      WORKERS_CACHE_MINIMUM_HIT_RATIO_PERCENT: ${{ vars.WORKERS_CACHE_MINIMUM_HIT_RATIO_PERCENT || '50' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect low-traffic cache evidence
        run: >-
          npm run cache:observability --
          --strict
          --hours=24
          --recent-minutes=15
          --max-recent-requests="${WORKERS_CACHE_MAX_RECENT_REQUESTS}"
          --minimum-requests="${WORKERS_CACHE_MINIMUM_REQUESTS}"
          --minimum-hit-ratio-percent="${WORKERS_CACHE_MINIMUM_HIT_RATIO_PERCENT}"
          --output=workers-cache-evidence.json

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workers-cache-evidence-${{ github.run_id }}
          path: workers-cache-evidence.json
          if-no-files-found: ignore
          retention-days: 90
