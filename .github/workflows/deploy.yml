name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild'
        required: false
        default: 'manual'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "production"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Minify generated assets
        run: npm run assets:minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        if: ${{ github.event_name == 'push' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Setup Ruby
        if: ${{ github.event_name == 'push' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Worker dependencies
        if: ${{ github.event_name == 'push' }}
        working-directory: worker
        run: npm ci

      - name: Sync Worker config and catalog
        if: ${{ github.event_name == 'push' }}
        run: npm run sync:worker-config

      - name: Deploy Worker
        if: ${{ github.event_name == 'push' }}
        working-directory: worker
        run: npx wrangler deploy -c wrangler.toml --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Purge Cloudflare cache
        if: ${{ vars.CLOUDFLARE_ENABLED == 'true' }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE" ]; then
            echo "CLOUDFLARE_ZONE secret is required to purge cache."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_CACHE_PURGE_TOKEN" ]; then
            echo "CLOUDFLARE_CACHE_PURGE_TOKEN or CLOUDFLARE_API_TOKEN secret is required to purge cache."
            exit 1
          fi

          response="$(mktemp)"
          status="$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_CACHE_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Cloudflare cache purge failed with status $status"
            cat "$response"
            exit 1
          fi
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
