name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild'
        required: false
        default: 'manual'

permissions:
  contents: read

concurrency:
  group: "production-operations"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Minify generated assets
        run: npm run assets:minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.2'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Sync Worker config and catalog
        run: npm run sync:worker-config

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy -c wrangler.toml --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Purge Workers Cache
        run: |
          if [ -z "$WORKERS_CACHE_PURGE_SECRET" ]; then
            echo "WORKERS_CACHE_PURGE_SECRET is not configured; skipping Workers Cache purge."
            exit 0
          fi

          response="$(mktemp)"
          for attempt in 1 2 3 4 5 6; do
            status="$(curl -sS -o "$response" -w "%{http_code}" \
              -X POST "$WORKERS_CACHE_PURGE_URL" \
              -H "Authorization: Bearer ${WORKERS_CACHE_PURGE_SECRET}" \
              -H "Content-Type: application/json" \
              --data '{"target":"all_known","source":"deploy"}')"

            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              exit 0
            fi
            if [ "$status" -lt 500 ] || [ "$attempt" -eq 6 ]; then
              break
            fi
            echo "Workers Cache purge returned transient status $status on attempt $attempt; waiting for Worker propagation."
            sleep "$((attempt * 5))"
          done

          echo "Workers Cache purge failed with status $status"
          cat "$response"
          exit 1
        env:
          WORKERS_CACHE_PURGE_URL: ${{ vars.WORKERS_CACHE_PURGE_URL || 'https://checkout.dustwave.xyz/admin/workers-cache/purge' }}
          WORKERS_CACHE_PURGE_SECRET: ${{ secrets.WORKERS_CACHE_PURGE_SECRET }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Purge Cloudflare cache
        if: ${{ vars.CLOUDFLARE_ENABLED == 'true' }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE" ]; then
            echo "CLOUDFLARE_ZONE secret is required to purge cache."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_CACHE_PURGE_TOKEN" ]; then
            echo "CLOUDFLARE_CACHE_PURGE_TOKEN or CLOUDFLARE_API_TOKEN secret is required to purge cache."
            exit 1
          fi

          response="$(mktemp)"
          status="$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_CACHE_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Cloudflare cache purge failed with status $status"
            cat "$response"
            exit 1
          fi
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify admin response security policy
        run: npm run cloudflare:admin-response-rule -- --verify-public --require-current
        env:
          SITE_BASE: https://shop.dustwave.xyz

      - name: Verify public crawl endpoints
        run: npm run test:crawl-endpoints -- --base=https://shop.dustwave.xyz --attempts=6 --retry-delay-ms=5000
